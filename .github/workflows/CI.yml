name: CI

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linuxriscv:
    # routes job to github runner on k8 pod with riscv node provisioned by RISE (cloud-v and scaleway)
    # see: https://github.com/apps/rise-risc-v-runners-personal
    # see: https://riseproject-dev.github.io/riscv-runner/
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
      - name: 2. Run uname # https://man7.org/linux/man-pages/man2/uname.2.html
        run: uname -m   # prints riscv64

      - name: 3. Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: 4. Run Rust tests
        working-directory: teeny/eagkers
        run: cargo +nightly test --features cpu
      - name: 5. Install uv
        uses: astral-sh/setup-uv@v5
      - name: 6. Build and install Python package
        working-directory: teeny
        run: uv run maturin develop
      - name: 7. Run Python tests
        working-directory: teeny
        run: uv run python -m unittest discover -s tests -v

      - name: 8. Install OpenBLAS
        run: sudo apt-get install -y libopenblas-dev
      - name: 9. Run CPU benchmarks
        working-directory: teeny/eagkers
        run: cargo +nightly bench --features cpu,cpudev 2>&1 | tee bench_results.txt
      - name: 10. Upload CPU benchmarks
        uses: actions/upload-artifact@v4
        with:
          name: bench-riscv64
          path: teeny/eagkers/bench_results.txt

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: teeny
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'wheels-*/*'
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
